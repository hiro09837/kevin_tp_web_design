<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">
<html xmlns="http://www.w3.org/1999/xhtml" xml:lang="fr" lang="fr">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TP Web Design Kevin</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;600;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
    <style>
        :root {
            --gradient-bg: linear-gradient(135deg, #e0eafc 0%, #cfdef3 100%);
            --text-primary: #1e293b;
            --accent-color: #2563eb;
            --glass-bg: rgba(255, 255, 255, 0.5);
            --glass-border: rgba(255, 255, 255, 0.6);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--gradient-bg);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* --- HEADER --- */
        .header {
            height: 120px; /* En-tête plus grand pour les logos */
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 4rem;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--glass-border);
            z-index: 10;
            box-shadow: 0 4px 20px rgba(0,0,0,0.03);
        }

        .header-title {
            font-family: 'Montserrat', sans-serif;
            font-size: 2.2rem;
            font-weight: 300;
            letter-spacing: 1px;
            text-align: center;
        }

        .logo-link {
            transition: transform 0.3s ease;
            display: inline-block;
        }
        
        .logo-link:hover {
            transform: scale(1.05); /* Petit effet au survol du logo */
        }

        .logo-img {
            height: 85px;
            object-fit: contain;
            filter: drop-shadow(0 2px 5px rgba(0,0,0,0.1)); /* Ajoute une ombre légère aux logos maintenant qu'ils sont transparents */
        }

        /* --- MAIN LAYOUT --- */
        .main-wrapper {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* --- SIDEBAR --- */
        .sidebar {
            width: 260px;
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(20px);
            border-right: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            padding: 2rem 0;
            z-index: 5;
            overflow-y: auto; /* Permet le défilement si le menu est trop long */
        }

        .menu-title {
            padding: 0 2rem;
            font-family: 'Montserrat', sans-serif;
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--accent-color);
            margin-bottom: 1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .menu-nav {
            display: flex;
            flex-direction: column;
        }

        .menu-item {
            padding: 1rem 2rem;
            color: var(--text-primary);
            text-decoration: none;
            font-weight: 500;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            border-left: 4px solid transparent;
            position: relative;
        }

        .menu-item::after {
            content: '';
            position: absolute;
            bottom: 0; left: 2rem; right: 2rem;
            height: 1px;
            background: rgba(0,0,0,0.05);
        }

        .menu-item:hover, .menu-item:focus {
            background: rgba(255, 255, 255, 0.7);
            border-left-color: var(--accent-color);
            color: var(--accent-color);
            padding-left: 2.5rem;
        }

        /* --- CONTENT AREA --- */
        .content-area {
            flex: 1;
            position: relative;
            background: transparent;
            overflow-y: auto; /* Fix scrolling on mobile */
            -webkit-overflow-scrolling: touch;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: transparent;
        }

        /* --- FOOTER --- */
        .footer {
            height: 50px;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            border-top: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.95rem;
            color: #475569;
            z-index: 10;
        }

        .hamburger-icon {
            display: none;
            font-size: 2.2rem;
            cursor: pointer;
            color: var(--accent-color);
            padding: 0.5rem;
            user-select: none;
        }

        /* --- RESPONSIVE MOBILE --- */
        @media (max-width: 900px) {
            .header {
                padding: 1rem;
                height: auto;
                display: grid;
                grid-template-columns: auto 1fr auto;
                grid-template-rows: auto auto auto;
                gap: 10px;
                align-items: center;
            }
            /* UAC à gauche, ENEAM à droite */
            .logo-link:first-child {
                grid-column: 1;
                grid-row: 1; /* Logo UAC en haut à gauche */
            }
            .logo-link:last-child {
                grid-column: 3;
                grid-row: 1; /* Logo ENEAM en haut à droite */
            }
            .hamburger-icon {
                display: block;
                grid-column: 1;
                grid-row: 2; /* Sous le logo UAC */
                justify-self: start;
                padding: 0;
            }
            .header-title {
                grid-column: 1 / -1;
                grid-row: 3;
                font-size: 1.3rem;
                text-align: center;
                margin-top: 0.5rem;
            }
            .logo-img { height: 50px; }

            .main-wrapper {
                flex-direction: row;
                position: relative;
                overflow: visible; /* Laisser l'iframe scroller */
                flex: 1;
            }
            .content-area {
                flex: 1;
                overflow-y: auto;
                -webkit-overflow-scrolling: touch;
                height: 100%;
            }
            iframe {
                height: 100%;
                min-height: 100%;
            }
            .sidebar {
                display: flex;
                flex-direction: column;
                width: 65%;
                height: 100%;
                padding: 1rem 0;
                border-right: 2px solid var(--accent-color);
                border-bottom: none;
                position: absolute;
                top: 0;
                left: -70%;
                background: rgba(255, 255, 255, 0.98);
                z-index: 20;
                box-shadow: 5px 0 20px rgba(0,0,0,0.2);
                transition: left 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
            }
            .menu-title { display: none; }
            .menu-nav { flex-direction: column; }
            .menu-item {
                padding: 1rem 1.5rem;
                border-left: none;
                border-bottom: 1px solid rgba(0,0,0,0.05);
                white-space: normal;
                text-align: left;
                font-size: 1.1rem;
            }
            .menu-item::after { display: none; }
            .menu-item:hover, .menu-item:focus {
                padding-left: 2rem;
                background: rgba(37, 99, 235, 0.1);
                border-bottom-color: rgba(0,0,0,0.05);
            }
            /* Affichage du menu par glissade */
            #mobile-menu-toggle:checked ~ .main-wrapper .sidebar {
                left: 0;
            }
        }
    </style>
</head>
<body>

    <!-- Checkbox cachée pour le menu hamburger (Pur CSS) -->
    <input type="checkbox" id="mobile-menu-toggle" style="display: none;" />

    <!-- HEADER -->
    <header class="header">
        <label for="mobile-menu-toggle" class="hamburger-icon" title="Menu">&#9776;</label>
        <!-- Liens vers les sites officiels -->
        <a href="https://uac.bj/" target="_blank" class="logo-link" title="Visiter le site de l'UAC">
            <img src="logo_uac_t.png" alt="Logo UAC" class="logo-img" onerror="this.style.display='none'" />
        </a>
        
        <h1 class="header-title">Bienvenue dans mon site web</h1>
        
        <a href="https://eneam.uac.bj/" target="_blank" class="logo-link" title="Visiter le site de l'ENEAM">
            <img src="logo_eneam_t.png" alt="Logo ENEAM" class="logo-img" onerror="this.style.display='none'" />
        </a>
    </header>

    <div class="main-wrapper">
        <!-- SIDEBAR -->
        <aside class="sidebar">
            <div class="menu-title">Menu</div>
            <nav class="menu-nav">
                <!-- On ajoute un onclick pour fermer le menu quand on clique sur un lien -->
                <a href="page1.html" class="menu-item" target="main-frame" onclick="document.getElementById('mobile-menu-toggle').checked = false;">Page 1</a>
                <a href="tp1.html" class="menu-item" target="main-frame" onclick="document.getElementById('mobile-menu-toggle').checked = false;">TP 1</a>
                <a href="tp2.html" class="menu-item" target="main-frame" onclick="document.getElementById('mobile-menu-toggle').checked = false;">TP 2</a>
                <a href="tp3.html" class="menu-item" target="main-frame" onclick="document.getElementById('mobile-menu-toggle').checked = false;">TP 3</a>
                <a href="liste.html" class="menu-item" target="main-frame" onclick="document.getElementById('mobile-menu-toggle').checked = false;">Liste</a>
                <a href="tableau.html" class="menu-item" target="main-frame" onclick="document.getElementById('mobile-menu-toggle').checked = false;">Tableau</a>
                <a href="formulaire.html" class="menu-item" target="main-frame" onclick="document.getElementById('mobile-menu-toggle').checked = false;">Formulaire</a>
                <a href="cv.html" class="menu-item" target="main-frame" onclick="document.getElementById('mobile-menu-toggle').checked = false;">CV</a>
            </nav>
        </aside>

        <!-- CONTENT AREA -->
        <main class="content-area">
            <iframe src="page1.html" name="main-frame" id="main-iframe" title="Contenu Principal"></iframe>
        </main>
    </div>

    <!-- FOOTER -->
    <footer class="footer">
        &copy; 2026 Kevin - Tous droits réservés.
    </footer>

</body>
</html>
